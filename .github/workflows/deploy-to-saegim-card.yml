name: Build & Deploy to saegim-card

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 사주팔자 repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Checkout saegim-card repo
        uses: actions/checkout@v4
        with:
          repository: rjbcom4263-lgtm/saegim-card
          token: ${{ secrets.SAEGIM_CARD_PAT }}
          path: saegim-card

      - name: Copy dist → saegim-card/saju/
        run: |
          rm -rf saegim-card/saju
          cp -r dist saegim-card/saju

      - name: Commit & push
        working-directory: saegim-card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saju/
          git diff --staged --quiet && echo "변경 없음" && exit 0
          git commit -m "chore: saju 앱 자동 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push
